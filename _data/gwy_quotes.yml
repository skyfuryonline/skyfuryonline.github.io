- text: "此时已属于我们，何不肩负苍生越北海；此时已属于我们，何不尺寸之地转乾坤。"
- text: "我认为，以本手沉潜，根基稳固；以妙手运行，方成大器。"
- text: "挫折并非完全是坏事，它能让一个人变得更加坚强。挫折是人生不可避免的一部分。关键在于我们如何看待和应对挫折。"
- text: "他们在折断的地方长得更结实，正是这种坚韧不拔的精神，让他们在人生的道路上越走越远。"
- text: "坚信，只要心中有梦想，勇往直前，总有一天我们会战胜挫折，成为更好的自己。"
- text: "挫折是一所最好的学校，它能教会我们如何在逆境中成长。"
- text: "人生没有过不去的坎，只有过不去的人。"
- text: "只有具备坚韧精神的人，才能在挫折中不断前行，最终走向成功。"
- text: "在挫折的洗礼中，生命之花将绽放得更加绚烂。正如凤凰涅槃，历经磨难后，迎接它的将是崭新的明天。"
- text: "挫折是人生的试金石，考验着我们的意志和信念。"
- text: "只有经历过挫折，我们才能更好地认识到自己的不足，从而不断成长。在过程中，或有辛酸，或有失败，但在这之后，光芒终将闪耀。"
- text: "用坚定的信念，顽强的拼搏笃定前行，迎难而上。"
- text: "奋斗是刘禹锡笔千淘万漉的辛苦，奋斗是郑板桥笔下咬定青山的坚韧，奋斗更是陆游笔下少壮工夫老始成的一番耐心和决心。"
- text: "乘风破浪会有时，直挂云帆济沧海。"
- text: "只要我们坚持不懈，勇敢面对，就一定能走向成功。"
- text: "逆境出人才。"
- text: "天才在于勤奋刻苦，成功在于坚持不懈。"
- text: "宁可肌肉在深夜里燃烧，不让情绪在失败中沉沦。"
- text: "咬定青山大地，立根黄沙破岩。"
- text: "初心不与年俱老，奋斗永似少年时。"
- text: "挫折成了砥砺人们意志的磨刀石，我们应当做一位生命的强者，坚强不屈，战胜挫折。"
- text: "人生固然充满了挫折不顺，可若是怀着积极的心态，笑对人生，便能悟得生命的真谛。"
- text: "机会是留给准备好的人，成功是属于最坚持的人。"
- text: "不顺利的逆境，要靠勇气克服。"
- text: "信念，可以让人从逆境中奋起，从失败中走向成功。"
- text: "人生不免挫折，激励自己将缺憾转为动力、逆境视为希望的转机。"
- text: "在挫折中成长，成为一个更加优秀的人。只有这样，我们才能在人生的道路上越走越远。"
- text: "挫折往往是一个人成长的过程，也是一个人塑造坚韧性格的过程。"
- text: "让我们不再抱怨命运，而是在挫折中奋发向前，书写属于自己的精彩人生。"
- text: "纸上得来终觉浅，绝知此事要躬行。"
- text: "穷且益坚，不负青云之志。"
- text: "稻盛和夫：渔夫出海前，并不知道鱼在哪里，可是他们还是选择出发，因为他们相信，一定会满载而归。人生很多时候，是选择了有机会，是相信了才有可能"
- text: "一天大部分的事情不要用意志力去做，而是用无意识去做。不是叫你漫不经心，而是你要学会小事不必决策，直接就去做，不用纠结，想洗澡就去洗澡，想睡觉就去睡觉，干脆一点，想到就去做，做完就放下。因为最累人的从来不是做事本身，而是没做之前那些反复的犹豫和思想的拉扯"
- text: "There is no plan B. I'm gonna make this shit happen"
- text: "当某件事足够重要时，即使胜算不大，你也要去做"
- text: "不要用负面的方式谈论自己，即使是开玩笑也不行。你的身体分不清。改变你谈论自己的方式，你就能改变你的人生。"
- text: "任何寻求安慰的行为，都不会让你成长，宿醉、旅行、甚至和朋友促膝长谈，这些都只是让你逃避眼前的痛苦,成长其实是特别艰难的过程，你必须抛弃所有爱听的漂亮话正视自己的无能和缺陷,甚至一遍又一遍砸碎过往认知再重塑,直到在废墟上站起来,这才是改变"
- text: "If you can overthink the worst, why can't you overthink the best"
- text: "你人生的黄金时期不是在二十多岁。而是你意识到没有人会来拯救你，你必须靠自己努力改变一切的那一刻。"
- text: "If there is even a 1% chance, FIGHT"
- text: "Focus on yourself. People come and go"
- text: "Just one life, don't give up"
- text: "One direction, Forward"