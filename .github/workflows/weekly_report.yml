name: Generate Weekly Gwy Report (DISABLED)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate_report:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Checkout Gwy Logs (private) 📚
        uses: actions/checkout@v4
        with:
          repository: skyfuryonline/blog-source
          ref: main
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-source
      
      - name: Make private content available for script
        run: |
          mv private-source/_gwy_logs ./_gwy_logs
          mv private-source/_gwy_reports ./_gwy_reports
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Generate Weekly Report
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE_URL: ${{ secrets.LLM_API_BASE_URL }}
        run: python crawlers/weekly_summary_generator.py
        
      - name: Commit and push report to blog-source
        run: |
          git clone --branch main https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/skyfuryonline/blog-source.git source-repo
          mkdir -p source-repo/_gwy_reports
          cp -r _gwy_reports/. source-repo/_gwy_reports/
          cd source-repo
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _gwy_reports/
          if ! git diff --staged --quiet; then
            git commit -m "docs(gwy): Generate weekly report"
            git push
          else
            echo "No new report generated."
          fi