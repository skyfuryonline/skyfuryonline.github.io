  <path d="M0 600 H1920" stroke="#58a6ff" stroke-width="2" opacity="0.1" />
  <path d="M400 0 V1080" stroke="#58a6ff" stroke-width="2" opacity="0.1" />
  <path d="M1200 0 V1080" stroke="#58a6ff" stroke-width="2" opacity="0.1" />
  
  <!-- Hexagon Pattern Overlay -->
  <path d="M100 100 L120 135 L100 170 L60 170 L40 135 L60 100 Z" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.1" transform="translate(1500, 200) scale(2)" />
  <path d="M100 100 L120 135 L100 170 L60 170 L40 135 L60 100 Z" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.1" transform="translate(1400, 260) scale(1.5)" />

  <!-- Code/Text Decor -->
